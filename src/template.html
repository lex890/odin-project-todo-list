<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo List</title>
</head>
<body>
  <div id="container">
    <header></header>
    <nav id="sidebar">
      <ul class="profile">
        <li>
          <img class='profile-picture' src="./images/profile-picture.svg" alt="profile-picture">
          <p class='username'>John Elation</p>
          <img src="./images/down.svg" alt="arrow-option">
        </li>
        <li>
          <img src="./images/bell.svg" alt="bell">
          <img src="./images/left-bar.svg" alt="close-side-bar">
        </li>
      </ul>
      <ul class="sidebar-elements">
        <li>
          <img src="./images/add-button.svg" alt="add-task">
          <p>Add task</p>
        </li>
        <li>
          <img src="./images/search-button.svg" alt="search">
          <p>Search</p>
        </li>
        <li>
          <img src="./images/inbox.svg" alt="inbox">
          <p>Inbox</p>
        </li>
        <li>
          <img src="./images/today-button.svg" alt="today">
          <p>Today</p>
        </li>
        <li>
          <img src="./images/upcoming.svg" alt="upcoming">
          <p>Upcoming</p>
        </li>
        <li>
          <img src="./images/filters-and-labels.svg" alt="filters-and-labels">
          <p>Filters & Labels</p>
        </li>
      </ul>
      <ul class="my-projects">
        <li>
          My Projects
          <div id="img">
            <img src="./images/add-button.svg" alt="add-task">
            <img src="./images/down.svg" alt="down"> 
          </div>
        </li>
      </ul>
    </nav>
    <div id="mytodo"></div>
    <footer><img src="images/github-logo-svgrepo-com.svg" alt="feet">Copyright ©Leks </footer>
  </div>

</body>
</html>
